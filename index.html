<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Günlük Alan</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #15171b;
      --muted: #68717b;
      --line: #dce2e8;
      --paper: #f2f5f7;
      --card: #ffffff;
      --green: #176956;
      --blue: #2f64cf;
      --coral: #c9513c;
      --amber: #a66f17;
      --violet: #6a5acd;
      --radius: 8px;
      --shadow: 0 18px 46px rgba(21, 28, 35, 0.12);
    }

    * { box-sizing: border-box; }

    html {
      background: var(--paper);
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(242, 245, 247, 0.88), rgba(247, 250, 249, 0.96)),
        url("https://images.unsplash.com/photo-1506784983877-45594efa4cbe?auto=format&fit=crop&w=1800&q=80") center / cover fixed;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--ink);
      font-weight: 850;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    button:hover {
      border-color: rgba(21, 23, 27, 0.28);
      box-shadow: 0 8px 18px rgba(21, 28, 35, 0.08);
    }

    button:active { transform: translateY(1px); }

    .page {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 calc(24px + env(safe-area-inset-bottom));
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(21, 23, 27, 0.11);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--green), var(--blue));
      color: white;
      font-weight: 950;
      box-shadow: 0 14px 30px rgba(47, 100, 207, 0.2);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6.6vw, 4.1rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 690px;
      color: #424a53;
      line-height: 1.45;
    }

    .today-chip {
      padding: 10px 12px;
      border: 1px solid rgba(21, 23, 27, 0.12);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-weight: 850;
      white-space: nowrap;
    }

    .auth-card {
      min-width: 210px;
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(21, 23, 27, 0.12);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.82);
    }

    .auth-user {
      display: none;
      grid-template-columns: 32px 1fr;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .auth-user img {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: #eef2f5;
    }

    .auth-name {
      min-width: 0;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .auth-mode {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .auth-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .google-btn {
      color: white;
      background: #1f1f1f;
      border-color: #1f1f1f;
    }

    .signout-btn {
      display: none;
      min-height: 40px;
      padding: 0 10px;
      color: var(--coral);
      background: rgba(201, 81, 60, 0.06);
      border-color: rgba(201, 81, 60, 0.24);
    }

    .week-strip {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      margin-bottom: 16px;
      overflow: auto;
    }

    .week-day {
      min-height: 70px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 4px;
      padding: 8px 4px;
      background: #fbfcfd;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      position: relative;
    }

    .week-day span:first-child {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .week-day span:last-child {
      font-size: 1.18rem;
      font-weight: 950;
    }

    .week-day.selected {
      background: #182a41;
      border-color: #182a41;
      color: white;
    }

    .week-day.selected span:first-child {
      color: rgba(255, 255, 255, 0.72);
    }

    .week-day.has-note::after {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--coral);
      position: absolute;
      right: 8px;
      bottom: 8px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 0.82fr) minmax(0, 1.18fr);
      gap: 18px;
      align-items: start;
    }

    .card {
      background: rgba(255, 255, 255, 0.93);
      border: 1px solid rgba(21, 23, 27, 0.1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .calendar {
      padding: 14px;
      position: sticky;
      top: 14px;
    }

    .monthbar {
      display: grid;
      grid-template-columns: 46px 1fr 46px;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .monthbar button {
      font-size: 1.3rem;
      color: var(--blue);
    }

    .month-title {
      text-align: center;
      font-size: 1.08rem;
      font-weight: 950;
      text-transform: capitalize;
    }

    .weekdays, .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .weekdays {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
    }

    .day {
      aspect-ratio: 1;
      min-height: 42px;
      display: grid;
      place-items: center;
      position: relative;
      border-color: transparent;
      border-radius: var(--radius);
      background: #f9fbfc;
      font-weight: 900;
    }

    .day.other {
      color: #a5adb4;
      background: rgba(249, 251, 252, 0.55);
    }

    .day.today {
      border-color: rgba(45, 98, 200, 0.55);
      color: var(--blue);
    }

    .day.selected {
      background: var(--green);
      color: white;
      box-shadow: 0 10px 22px rgba(23, 105, 86, 0.22);
    }

    .day.has-note::after {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--coral);
      position: absolute;
      bottom: 7px;
      right: 7px;
    }

    .day.selected.has-note::after {
      background: #fff;
    }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .soft {
      color: var(--blue);
      border-color: rgba(45, 98, 200, 0.28);
      background: rgba(255, 255, 255, 0.72);
    }

    .editor {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .editor-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .selected-date {
      display: grid;
      gap: 4px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.6rem, 5vw, 3rem);
      line-height: 1;
      letter-spacing: 0;
      text-transform: capitalize;
    }

    .save-state {
      color: var(--green);
      background: rgba(23, 105, 86, 0.09);
      border: 1px solid rgba(23, 105, 86, 0.16);
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 850;
      white-space: nowrap;
      padding: 7px 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      min-height: 74px;
      display: grid;
      align-content: space-between;
      gap: 6px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
    }

    .stat strong {
      font-size: 1.18rem;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .section {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--muted);
      font-weight: 850;
      font-size: 0.86rem;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
      color: var(--ink);
      outline: none;
    }

    input {
      min-height: 48px;
      padding: 10px 12px;
    }

    textarea {
      min-height: 250px;
      resize: vertical;
      padding: 15px;
      line-height: 1.58;
    }

    input:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(45, 98, 200, 0.12);
    }

    .task-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .primary {
      min-width: 112px;
      padding: 0 14px;
      color: white;
      background: var(--blue);
      border-color: var(--blue);
      box-shadow: 0 12px 24px rgba(47, 100, 207, 0.18);
    }

    .tasks {
      display: grid;
      gap: 8px;
    }

    .task {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
    }

    .check {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border: 2px solid var(--green);
      border-radius: 7px;
      color: transparent;
      font-weight: 950;
      user-select: none;
    }

    .task.done .check {
      color: white;
      background: var(--green);
    }

    .task-text {
      overflow-wrap: anywhere;
      font-weight: 760;
    }

    .task.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .delete {
      min-height: 34px;
      padding: 0 10px;
      border-color: rgba(201, 79, 60, 0.25);
      background: rgba(201, 79, 60, 0.06);
      color: var(--coral);
      font-size: 0.86rem;
    }

    .empty {
      padding: 14px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(251, 252, 253, 0.7);
      line-height: 1.45;
    }

    .tools {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding-top: 4px;
    }

    .danger {
      color: var(--coral);
      border-color: rgba(201, 79, 60, 0.28);
      background: rgba(255, 255, 255, 0.7);
    }

    @media (max-width: 860px) {
      body { background-attachment: scroll; }

      .page {
        width: min(100% - 20px, 680px);
        padding-top: 10px;
      }

      header {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .brand {
        align-items: flex-start;
      }

      .today-chip {
        width: fit-content;
        white-space: normal;
      }

      .auth-card {
        width: 100%;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .week-strip {
        grid-template-columns: repeat(7, minmax(74px, 1fr));
      }

      .calendar {
        position: static;
      }

      .editor-head {
        flex-direction: column;
      }

      .save-state {
        white-space: normal;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .page {
        width: 100%;
        padding-left: 10px;
        padding-right: 10px;
      }

      .weekdays, .days {
        gap: 4px;
      }

      .day {
        min-height: 39px;
        font-size: 0.9rem;
      }

      .mark {
        width: 46px;
        height: 46px;
      }

      .auth-actions {
        grid-template-columns: 1fr;
      }

      .task-form {
        grid-template-columns: 1fr;
      }

      .primary {
        width: 100%;
      }

      .tools {
        flex-direction: column;
      }

      .tools button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true">GA</div>
        <div>
          <h1>Günlük Alan</h1>
          <p class="subtitle">Günü yakala, hafif tut.</p>
        </div>
      </div>
      <div class="today-chip" id="todayChip"></div>
      <section class="auth-card" aria-label="Hesap">
        <div class="auth-user" id="authUser">
          <img id="authAvatar" alt="" />
          <div>
            <div class="auth-name" id="authName">Misafir</div>
            <div class="auth-mode" id="authMode">Yerel kayıt</div>
          </div>
        </div>
        <div class="auth-actions">
          <button class="google-btn" id="signInBtn">Google ile gir</button>
          <button class="signout-btn" id="signOutBtn">Çık</button>
        </div>
      </section>
    </header>

    <nav class="card week-strip" id="weekStrip" aria-label="Haftalık hızlı seçim"></nav>

    <section class="layout" aria-label="Takvim ve not uygulaması">
      <aside class="card calendar">
        <div class="monthbar">
          <button id="prevMonth" aria-label="Önceki ay">‹</button>
          <div class="month-title" id="monthTitle"></div>
          <button id="nextMonth" aria-label="Sonraki ay">›</button>
        </div>
        <div class="weekdays" aria-hidden="true">
          <div>Pzt</div><div>Sal</div><div>Çar</div><div>Per</div><div>Cum</div><div>Cmt</div><div>Paz</div>
        </div>
        <div class="days" id="days"></div>
        <div class="quick-row">
          <button class="soft" id="goToday">Bugün</button>
          <button class="soft" id="newBlank">Boşalt</button>
        </div>
      </aside>

      <section class="card editor">
        <div class="editor-head">
          <div class="selected-date">
            <div class="eyebrow">Seçili gün</div>
            <h2 id="selectedTitle"></h2>
          </div>
          <div class="save-state" id="saveState">Hazır.</div>
        </div>

        <div class="stats" aria-label="Gün özeti">
          <div class="stat">
            <div class="eyebrow">Not</div>
            <strong id="noteStatus">Boş</strong>
          </div>
          <div class="stat">
            <div class="eyebrow">Görev</div>
            <strong id="taskTotal">0</strong>
          </div>
          <div class="stat">
            <div class="eyebrow">Biten</div>
            <strong id="taskDone">0</strong>
          </div>
        </div>

        <div class="section">
          <label for="dailyNote">Günün notu</label>
          <textarea id="dailyNote" placeholder="Bugün ne önemli? Kısa düşünceler, toplantı notları, fikirler..."></textarea>
        </div>

        <div class="section">
          <label for="taskInput">Küçük yapılacak</label>
          <form class="task-form" id="taskForm">
            <input id="taskInput" placeholder="Örn: faturayı öde, kitapçıya uğra" />
            <button class="primary" type="submit">Ekle</button>
          </form>
          <div class="tasks" id="tasks"></div>
        </div>

        <div class="tools">
          <button class="soft" id="copyDay">Günü kopyala</button>
          <button class="danger" id="clearDay">Bu günü temizle</button>
        </div>
      </section>
    </section>
  </main>

  <script src="./supabase-config.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.4";

    const todayChip = document.querySelector("#todayChip");
    const weekStrip = document.querySelector("#weekStrip");
    const monthTitle = document.querySelector("#monthTitle");
    const days = document.querySelector("#days");
    const selectedTitle = document.querySelector("#selectedTitle");
    const dailyNote = document.querySelector("#dailyNote");
    const saveState = document.querySelector("#saveState");
    const taskForm = document.querySelector("#taskForm");
    const taskInput = document.querySelector("#taskInput");
    const tasks = document.querySelector("#tasks");
    const prevMonth = document.querySelector("#prevMonth");
    const nextMonth = document.querySelector("#nextMonth");
    const goToday = document.querySelector("#goToday");
    const newBlank = document.querySelector("#newBlank");
    const copyDay = document.querySelector("#copyDay");
    const clearDay = document.querySelector("#clearDay");
    const noteStatus = document.querySelector("#noteStatus");
    const taskTotal = document.querySelector("#taskTotal");
    const taskDone = document.querySelector("#taskDone");
    const signInBtn = document.querySelector("#signInBtn");
    const signOutBtn = document.querySelector("#signOutBtn");
    const authUser = document.querySelector("#authUser");
    const authAvatar = document.querySelector("#authAvatar");
    const authName = document.querySelector("#authName");
    const authMode = document.querySelector("#authMode");

    const today = new Date();
    let cursor = new Date(today.getFullYear(), today.getMonth(), 1);
    let selected = toKey(today);
    let store = JSON.parse(localStorage.getItem("gunluk-alan") || "{}");
    let supabase = null;
    let activeUser = null;
    let cloudReady = false;

    const supabaseConfig = window.GUNLUK_ALAN_SUPABASE_CONFIG || {};
    const hasSupabaseConfig = Boolean(supabaseConfig.url && supabaseConfig.anonKey);

    if (hasSupabaseConfig) {
      supabase = createClient(supabaseConfig.url, supabaseConfig.anonKey);
      cloudReady = true;
    }

    todayChip.textContent = new Intl.DateTimeFormat("tr-TR", {
      weekday: "long",
      day: "numeric",
      month: "long"
    }).format(today);

    function toKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function fromKey(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getDayData(key = selected) {
      if (!store[key]) store[key] = { note: "", tasks: [] };
      return store[key];
    }

    async function saveSelectedDayToCloud() {
      if (!cloudReady || !activeUser) return;
      const data = getDayData();

      if (!data.note.trim() && !data.tasks.length) {
        const { error } = await supabase
          .from("daily_notes")
          .delete()
          .eq("user_id", activeUser.id)
          .eq("day_key", selected);
        if (error) throw error;
        return;
      }

      const { error } = await supabase
        .from("daily_notes")
        .upsert({
          user_id: activeUser.id,
          day_key: selected,
          note: data.note,
          tasks: data.tasks,
          updated_at: new Date().toISOString()
        }, { onConflict: "user_id,day_key" });

      if (error) throw error;
    }

    async function loadCloudStore(user) {
      const { data, error } = await supabase
        .from("daily_notes")
        .select("day_key,note,tasks")
        .eq("user_id", user.id);

      if (error) throw error;

      const nextStore = {};
      data.forEach((row) => {
        nextStore[row.day_key] = {
          note: row.note || "",
          tasks: Array.isArray(row.tasks) ? row.tasks : []
        };
      });

      if (Object.keys(nextStore).length) {
        store = nextStore;
        localStorage.setItem("gunluk-alan", JSON.stringify(store));
      } else {
        const rows = Object.keys(store)
          .map((key) => {
            const data = store[key];
            if (!data || (!data.note?.trim() && !data.tasks?.length)) return null;
            return {
              user_id: user.id,
              day_key: key,
              note: data.note || "",
              tasks: Array.isArray(data.tasks) ? data.tasks : [],
              updated_at: new Date().toISOString()
            };
          })
          .filter(Boolean);

        if (rows.length) {
          const { error: upsertError } = await supabase
            .from("daily_notes")
            .upsert(rows, { onConflict: "user_id,day_key" });
          if (upsertError) throw upsertError;
        }
      }
    }

    function getUserName(user) {
      return user.user_metadata?.full_name || user.user_metadata?.name || user.email || "Google hesabı";
    }

    function getUserAvatar(user) {
      return user.user_metadata?.avatar_url || user.user_metadata?.picture || "";
    }

    function renderAuth() {
      if (!hasSupabaseConfig) {
        authUser.style.display = "grid";
        authAvatar.removeAttribute("src");
        authName.textContent = "Kurulum gerekli";
        authMode.textContent = "Supabase ayarı bekliyor";
        signInBtn.textContent = "Google hazır değil";
        signInBtn.disabled = true;
        signOutBtn.style.display = "none";
        return;
      }

      if (!activeUser) {
        authUser.style.display = "grid";
        authAvatar.removeAttribute("src");
        authName.textContent = "Misafir";
        authMode.textContent = "Bu cihazda kayıt";
        signInBtn.textContent = "Google ile gir";
        signInBtn.disabled = false;
        signOutBtn.style.display = "none";
        return;
      }

      authUser.style.display = "grid";
      authAvatar.src = getUserAvatar(activeUser);
      authName.textContent = getUserName(activeUser);
      authMode.textContent = "Supabase'e kaydediliyor";
      signInBtn.textContent = "Bağlı";
      signInBtn.disabled = true;
      signOutBtn.style.display = "block";
    }

    function persist(message = "Kaydedildi.") {
      localStorage.setItem("gunluk-alan", JSON.stringify(store));
      saveState.textContent = message;
      saveSelectedDayToCloud().catch(() => {
        saveState.textContent = "Yerel kaydedildi.";
      });
      window.clearTimeout(persist._timer);
      persist._timer = window.setTimeout(() => {
        saveState.textContent = "Hazır.";
      }, 1200);
      renderCalendar();
      renderWeekStrip();
      renderStats();
    }

    function formatSelectedTitle() {
      selectedTitle.textContent = new Intl.DateTimeFormat("tr-TR", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      }).format(fromKey(selected));
    }

    function hasContent(key) {
      const data = store[key];
      return Boolean(data && (data.note.trim() || data.tasks.length));
    }

    function renderCalendar() {
      monthTitle.textContent = new Intl.DateTimeFormat("tr-TR", {
        month: "long",
        year: "numeric"
      }).format(cursor);

      const firstDay = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
      const startOffset = (firstDay.getDay() + 6) % 7;
      const start = new Date(cursor.getFullYear(), cursor.getMonth(), 1 - startOffset);
      const cells = [];

      for (let index = 0; index < 42; index += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        const key = toKey(date);
        const classes = ["day"];
        if (date.getMonth() !== cursor.getMonth()) classes.push("other");
        if (key === toKey(today)) classes.push("today");
        if (key === selected) classes.push("selected");
        if (hasContent(key)) classes.push("has-note");
        cells.push(`<button class="${classes.join(" ")}" data-date="${key}" aria-label="${key}">${date.getDate()}</button>`);
      }

      days.innerHTML = cells.join("");
    }

    function renderWeekStrip() {
      const selectedDate = fromKey(selected);
      const start = new Date(selectedDate);
      start.setDate(selectedDate.getDate() - ((selectedDate.getDay() + 6) % 7));
      const dayFormatter = new Intl.DateTimeFormat("tr-TR", { weekday: "short" });
      const cells = [];

      for (let index = 0; index < 7; index += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        const key = toKey(date);
        const classes = ["week-day"];
        if (key === selected) classes.push("selected");
        if (hasContent(key)) classes.push("has-note");
        cells.push(`
          <button class="${classes.join(" ")}" data-week-date="${key}" aria-label="${key}">
            <span>${dayFormatter.format(date)}</span>
            <span>${date.getDate()}</span>
          </button>
        `);
      }

      weekStrip.innerHTML = cells.join("");
    }

    function renderStats() {
      const data = getDayData();
      const doneCount = data.tasks.filter((task) => task.done).length;
      noteStatus.textContent = data.note.trim() ? `${data.note.trim().length} karakter` : "Boş";
      taskTotal.textContent = String(data.tasks.length);
      taskDone.textContent = String(doneCount);
    }

    function renderDay() {
      const data = getDayData();
      formatSelectedTitle();
      dailyNote.value = data.note;
      renderStats();

      if (!data.tasks.length) {
        tasks.innerHTML = '<div class="empty">Bu gün için yapılacak yok. Küçük bir şey ekleyebilirsin.</div>';
      } else {
        tasks.innerHTML = data.tasks.map((task) => `
          <article class="task ${task.done ? "done" : ""}" data-id="${task.id}">
            <button class="check" data-action="toggle" aria-label="Tamamlandı">${task.done ? "✓" : "✓"}</button>
            <div class="task-text">${escapeHtml(task.text)}</div>
            <button class="delete" data-action="delete">Sil</button>
          </article>
        `).join("");
      }

      renderCalendar();
      renderWeekStrip();
    }

    days.addEventListener("click", (event) => {
      const button = event.target.closest("[data-date]");
      if (!button) return;
      selected = button.dataset.date;
      const date = fromKey(selected);
      cursor = new Date(date.getFullYear(), date.getMonth(), 1);
      renderDay();
    });

    weekStrip.addEventListener("click", (event) => {
      const button = event.target.closest("[data-week-date]");
      if (!button) return;
      selected = button.dataset.weekDate;
      const date = fromKey(selected);
      cursor = new Date(date.getFullYear(), date.getMonth(), 1);
      renderDay();
    });

    dailyNote.addEventListener("input", () => {
      getDayData().note = dailyNote.value;
      persist();
    });

    taskForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = taskInput.value.trim();
      if (!text) return;
      getDayData().tasks.push({ id: crypto.randomUUID(), text, done: false });
      taskInput.value = "";
      persist("Görev eklendi.");
      renderDay();
    });

    tasks.addEventListener("click", (event) => {
      const action = event.target.dataset.action;
      const row = event.target.closest("[data-id]");
      if (!action || !row) return;
      const data = getDayData();
      const task = data.tasks.find((item) => item.id === row.dataset.id);
      if (action === "toggle" && task) task.done = !task.done;
      if (action === "delete") data.tasks = data.tasks.filter((item) => item.id !== row.dataset.id);
      persist(action === "toggle" ? "Güncellendi." : "Silindi.");
      renderDay();
    });

    prevMonth.addEventListener("click", () => {
      cursor = new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1);
      renderCalendar();
    });

    nextMonth.addEventListener("click", () => {
      cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
      renderCalendar();
    });

    goToday.addEventListener("click", () => {
      selected = toKey(today);
      cursor = new Date(today.getFullYear(), today.getMonth(), 1);
      renderDay();
    });

    newBlank.addEventListener("click", () => {
      dailyNote.focus();
      dailyNote.select();
    });

    clearDay.addEventListener("click", () => {
      if (!hasContent(selected)) return;
      const confirmed = confirm("Bu güne ait not ve yapılacaklar silinsin mi?");
      if (!confirmed) return;
      delete store[selected];
      persist("Gün temizlendi.");
      renderDay();
    });

    copyDay.addEventListener("click", async () => {
      const data = getDayData();
      const lines = [
        selectedTitle.textContent,
        "",
        data.note || "Not yok.",
        "",
        "Yapılacaklar:",
        ...(data.tasks.length ? data.tasks.map((task) => `${task.done ? "[x]" : "[ ]"} ${task.text}`) : ["Yok."])
      ];
      await navigator.clipboard.writeText(lines.join("\n"));
      saveState.textContent = "Gün kopyalandı.";
    });

    signInBtn.addEventListener("click", async () => {
      if (!supabase) return;
      saveState.textContent = "Google bekleniyor...";
      try {
        const { error } = await supabase.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: window.location.origin
          }
        });
        if (error) throw error;
      } catch (error) {
        saveState.textContent = "Giriş tamamlanmadı.";
      }
    });

    signOutBtn.addEventListener("click", async () => {
      if (!supabase) return;
      await supabase.auth.signOut();
    });

    if (supabase) {
      supabase.auth.getSession().then(async ({ data }) => {
        activeUser = data.session?.user || null;
        renderAuth();

        if (activeUser) {
          saveState.textContent = "Notlar yükleniyor...";
          try {
            await loadCloudStore(activeUser);
            saveState.textContent = "Bulut bağlı.";
          } catch (error) {
            saveState.textContent = "Yerel modda kaldı.";
          }
        } else {
          saveState.textContent = "Yerel mod.";
        }

        renderDay();
      });

      supabase.auth.onAuthStateChange(async (_event, session) => {
        activeUser = session?.user || null;
        renderAuth();

        if (activeUser) {
          saveState.textContent = "Notlar yükleniyor...";
          try {
            await loadCloudStore(activeUser);
            saveState.textContent = "Bulut bağlı.";
          } catch (error) {
            saveState.textContent = "Yerel modda kaldı.";
          }
        } else {
          saveState.textContent = "Yerel mod.";
        }

        renderDay();
      });
    } else {
      renderAuth();
    }

    renderDay();
  </script>
</body>
</html>
